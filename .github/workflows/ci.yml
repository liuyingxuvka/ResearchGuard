name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: ${{ matrix.os }} / Python 3.12
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install --upgrade pip build && python -m pip install -e ".[test]"

      - name: Test
        run: python -m pytest

      - name: Validate suite and retired-path residuals
        run: |
          python scripts/check_researchguard_suite.py --member all --json
          python scripts/check_zero_residuals.py --json

      - name: Build release distributions
        run: python -m build
