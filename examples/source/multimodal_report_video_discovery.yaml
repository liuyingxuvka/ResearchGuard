metadata:
  purpose: Model report, image, and video source discovery needs without fake extraction.
  repository: https://github.com/liuyingxuvka/ResearchGuard
  skill: SourceGuard
  math_boundary: POMDP-inspired approximate planner; utility ranks source discovery value, not truth.
  cli: researchguard source plan examples/multimodal_report_video_discovery.yaml --model-contract examples/multimodal_report_video_discovery.contract.json
    --pretty
  boundary: Multimodal anchors need locators and supplied extraction input; SourceGuard does not perform OCR or media understanding.
  version: 0.1.3
  source_policy: public_only
