guard_contract:
  schema_version: researchguard.source.model_guard_contract.v2
  model_id: multimodal_report_video_discovery
  purpose: Prevent a located but unusable image or video anchor from closing the visual evidence gap.
  prevented_failures:
  - failure_id: failure:multimodal:unqualified-visual-anchor
    title: Unqualified visual anchor is promoted as usable evidence
    block_when: the visual gap is treated as closed although the supplied visual anchor is not claim-usable
    oracle_id: oracle:sourceguard:source-qualification
    known_good:
      case_id: good:multimodal:qualified-visual
      observation_path: model-purpose-observation.yaml
      expected_native_status: pass
      mutation_id: ''
      expected_native_finding: ''
    known_bad:
      case_id: bad:multimodal:unqualified-visual
      observation_path: model-purpose-observation.yaml
      expected_native_status: blocked
      mutation_id: make-all-anchors-unusable
      expected_native_finding: gaps:gap-visual
  external_universe:
    gap_ids:
    - gap-pdf-page
    - gap-visual
    target_unit_ids: []
  claim_boundary: Multimodal anchors need locators and supplied extraction input; SourceGuard does not perform OCR or media
    understanding.
  native_oracle_catalog_fingerprint: 2C01D891559625D9123F17E817B63B3E4E9323CA1C3EB81923B82D7DBDC79B15
  purpose_frozen: true
  purpose_freeze_sequence: 1
  candidate_construction_sequence: 2
