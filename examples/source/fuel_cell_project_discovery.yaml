  importance: 0.9
  blocking: true
  suggested_source_roles:
  - primary_source
  - independent_report
  - counter_evidence
  suggested_modalities:
  - text
  semantic_state: discovered
  requires_claim_usability: true
- gap_id: gap-execution
  lead_id: fuel-cell-deployment
