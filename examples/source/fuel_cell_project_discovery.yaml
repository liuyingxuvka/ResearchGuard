guard_contract:
  schema_version: researchguard.source.model_guard_contract.v2
  model_id: fuel_cell_project_discovery
  purpose: Prevent a weak fuel-cell deployment signal from being promoted before a claim-usable primary anchor is observed.
  prevented_failures:
  - failure_id: failure:fuel-cell:unqualified-deployment-signal
    title: Weak deployment signal is promoted as qualified project evidence
    block_when: the weak-signal gap is treated as closed although its primary anchor is not claim-usable
    oracle_id: oracle:sourceguard:source-qualification
    known_good:
      case_id: good:fuel-cell:qualified-primary
      observation_path: model-purpose-observation.yaml
      expected_native_status: pass
      mutation_id: ''
      expected_native_finding: ''
    known_bad:
      case_id: bad:fuel-cell:unqualified-primary
      observation_path: model-purpose-observation.yaml
      expected_native_status: blocked
      mutation_id: make-all-anchors-unusable
      expected_native_finding: gaps:gap-weak-signal
  external_universe:
    gap_ids:
    - gap-execution
    - gap-independent
    - gap-location
    - gap-weak-signal
    target_unit_ids: []
  claim_boundary: Weak signals are source candidates, not deployment proof.
  native_oracle_catalog_fingerprint: 2C01D891559625D9123F17E817B63B3E4E9323CA1C3EB81923B82D7DBDC79B15
  purpose_frozen: true
  purpose_freeze_sequence: 1
  candidate_construction_sequence: 2
candidate_contract_fingerprint: 1AF12F1FC5258485C5E3EC389AF085E744F5100C8C10228CEA313896EF0F0A5F
metadata:
  purpose: Investigate whether a fuel cell project is deployed or operating.
  repository: https://github.com/liuyingxuvka/ResearchGuard
  skill: SourceGuard
  math_boundary: POMDP-inspired approximate planner; utility ranks source discovery value, not truth.
  cli: researchguard source plan examples/fuel_cell_project_discovery.yaml --model-contract examples/fuel_cell_project_discovery.contract.json
    --pretty
  boundary: Weak signals are source candidates, not deployment proof.
  version: 0.1.4
  source_policy: public_only
  domain_hints:
  - fuel cell
  - named industrial park
  - project operation
  qualification_thresholds:
    source_reliability: 0.5
    extraction_confidence: 0.5
    specificity: 0.5
leads:
- lead_id: fuel-cell-deployment
  question: Has the named fuel cell project been deployed or operated?
  hypothesis: Company-facing signals may point to a real deployment, but execution evidence is missing.
  importance: 0.95
  status: supported_incomplete
  related_entities:
  - Example FuelCellCo
  - Example Industrial Park
  related_sources:
  - src-company-pr
  - src-patent
  - src-hiring
  - src-government-page
  related_anchors: []
  gaps:
  - gap-weak-signal
  - gap-execution
  - gap-location
  - gap-independent
sources:
- source_id: src-company-pr
  title: Company press release announcing fuel cell project
  source_type: web_page
  url: https://example.invalid/company-pr
  source_status: candidate
  source_reliability: 0.4
  source_role: official_claim
  source_date: '2025-06-12'
  coverage_period: '2025'
  language: en
  country: US
