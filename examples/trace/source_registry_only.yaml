  extraction_confidence: 0.5
  evidence_specificity: 0.2
  supports:
  - event_source_only
  limits:
  - not a project record
  warnings:
  - source row is not project
  usable_as_project_evidence: false
entities:
- mention_id: ent_source
  evidence_id: ev_source_only
  raw_name: Registry row
  normalized_name: registry row
  entity_type: source
  aliases: []
