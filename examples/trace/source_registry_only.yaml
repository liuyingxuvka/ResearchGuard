  purpose: Demonstrate source registry row is not project database.
  repository: https://github.com/liuyingxuvka/ResearchGuard
  skill: TraceGuard
  math_boundary: Typed constrained HL-MRF/MAP inference compiled to one convex QP
    and solved directly by OSQP; structural support is not calibrated probability.
  cli: researchguard trace validate examples/source_registry_only.yaml
  boundary: Source-only records must not be drawn as project points.
sources:
