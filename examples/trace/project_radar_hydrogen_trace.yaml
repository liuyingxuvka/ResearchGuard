metadata:
  schema_version: researchguard.trace.model.v2
  purpose: ProjectRadar-style hydrogen project trace candidate with mixed source lanes.
  model_instance_id: researchguard.trace.example.project-radar.hydrogen-trace
  repository: https://github.com/liuyingxuvka/ResearchGuard
  skill: TraceGuard
  math_boundary: Typed constrained HL-MRF/MAP inference compiled to one convex QP
    and solved directly by OSQP; structural support is not calibrated probability.
  cli: researchguard trace evaluate examples/project_radar_hydrogen_trace.yaml --pretty
  boundary: Source registry rows become evidence, events, and trace candidates before
    project claims.
  guard_purpose_contract:
    schema_version: researchguard.trace.guard_purpose_binding.v2
    contract_kind: task_model_instance
    contract_id: researchguard.trace.example.project-radar.task-purpose.v1
    model_instance_id: researchguard.trace.example.project-radar.hydrogen-trace
    purpose: Prevent this project-radar trace model from treating unusable event evidence
      or a contradictory event order as a supported clean storyline.
    claim_boundary: This task model tests evidence usability and visible temporal
      contradiction for the packaged example; it does not prove factual project status,
      causality, or future outcomes.
    selected_failure_ids:
    - missing-event-evidence
    - hidden-temporal-contradiction
    contract_ref: project_radar_task_purpose.json
    contract_fingerprint: 0b92fdd04484b5a6f6224a2977d2dcb91dd699cc89f2b9f3f95520492492494c
    proof_receipt_fingerprint: 529f69d4126c6efff9bef6721e143084eba72164e1bd4307aaa026377ee5374a
    candidate_fingerprint: 9fcf29e758171235bc9cca6a86415d9416e85e6c20c1348f94505aabc61affd0
    purpose_declared_sequence: 1
    proof_completed_sequence: 2
    candidate_bound_sequence: 3
