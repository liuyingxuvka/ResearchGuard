  source_id: src_funding
  raw_text: Funding award names the Rhine Hydrogen Hub and a 20 MW electrolyzer package.
  normalized_summary: Funding supports a project candidate but not operation.
  evidence_type: funding_award
  extraction_confidence: 0.9
  evidence_specificity: 0.9
  importance: 0.95
  supports:
