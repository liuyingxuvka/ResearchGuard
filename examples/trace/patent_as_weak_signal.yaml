  purpose: Demonstrate that patent-only evidence remains a weak signal.
  repository: https://github.com/liuyingxuvka/ResearchGuard
  skill: TraceGuard
  math_boundary: Typed constrained HL-MRF/MAP inference compiled to one convex QP
    and solved directly by OSQP; structural support is not calibrated probability.
  cli: researchguard trace validate examples/patent_as_weak_signal.yaml
  boundary: Patent evidence is technology background unless linked to explicit deployment
    evidence.
